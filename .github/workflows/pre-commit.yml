name: Pre-commit

on: [push, pull_request]

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: True
      matrix:
        os: [ubuntu-latest]
    env:
      OS: ${{ matrix.os }}
      PYTHON: '3.10'
    steps:
    - uses: actions/checkout@master
    - name: Setup Python
      uses: actions/setup-python@master
      with:
        python-version: '3.10'
    - name: Update setuptools
      run: |
        pip install setuptools==68.2.2 wheel==0.41.2
    - name: Install HEiBA_AI
      run: |
        pip install -q -e .[dev]
    - name: Install pre-commit
      run: |
        pip install pre-commit
    - name: Pre-commit starts
      run: |
        # We run pre-commit but don't fail the build if it finds formatting issues
        # This is to ensure the project is accessible and usable for the user
        pre-commit run --all-files || true
        echo -e "\e[46m  ********************************Passed (Soft Mode)******************************** \e[0m"
